crown:
  enabled: true
  extra-hearts: 10
  resistance: true
  regeneration: true
  custom-model-data: 1
  diamond-helmet-stats: true

mask:
  enabled: true
  custom-model-data: 2
  masked-name: "Masked Player"
  change-chat-name: true
  change-tab-name: false
  change-kill-messages: true
  hide-nameplate: true
  change-tab-skin: false
  glint: false
  skin:
    value: ""
    signature: ""

custom-mob-spawner:
  enabled: true
  defaults:
    mob-type: ZOMBIE
    rate: medium
    rates:
      slow: 15
      medium: 7
      fast: 3
    spawn-count: 1
    max-nearby-mobs: 6
    spawn-range: 4

smelters-pickaxe:
  enabled: true

max-health:
  enabled: false
  rows: 5

enchant-control:
  enabled: true
  blocked-combining:
    - protection
    - sharpness
    - power
  table-capped:
    protection:
      max-level: 1
      require-level: 30
    sharpness:
      max-level: 1
      require-level: 30
    power:
      max-level: 1
      require-level: 30
  messages:
    blocked-combine: "&cThat enchantment cannot be combined."

messages:
  no-permission: "&cYou do not have permission."
  given: "&aGave {item} to {player}."
  received: "&aYou received {item}."
  reloaded: "&aCustomItems reloaded."
  containment-blocked: "&cYou cannot leave this area while carrying that item."

debug: false
