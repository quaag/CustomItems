crown:
  enabled: true
  extra-hearts: 10
  resistance: true
  regeneration: true
  custom-model-data: 1
  diamond-helmet-stats: true

mask:
  enabled: true
  custom-model-data: 2
  masked-name: "Masked Player"
  change-chat-name: true
  change-tab-name: false
  change-kill-messages: true
  hide-nameplate: true
  change-tab-skin: false
  glint: false
  skin:
    value: ""
    signature: ""

custom-mob-spawner:
  enabled: true
  defaults:
    mob-type: ZOMBIE
    rate: medium
    rates:
      slow: 15
      medium: 7
      fast: 3
    spawn-count: 1
    max-nearby-mobs: 6
    spawn-range: 4

heads:
  enabled: true
  player-head:
    drop-on-player-kill: true
    cooldown-seconds: 10
    regen-amplifier: 1
    duration-seconds: 5
  golden-head:
    cooldown-seconds: 20
    regen-amplifier: 2
    absorption-amplifier: 1
    speed-amplifier: 1
    duration-seconds: 5

messages:
  no-permission: "&cYou do not have permission."
  given: "&aGave {item} to {player}."
  received: "&aYou received {item}."
  reloaded: "&aCustomItems reloaded."

debug: false
