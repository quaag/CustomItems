name: CustomItems
version: '${version}'
main: com.customitems.CustomItemsPlugin
api-version: '1.21'
author: quaag
description: Custom items for Paper servers.
commands:
  customitems:
    description: CustomItems administration commands.
    usage: /customitems <version|give|reload|maskskin|signbook|spawner|hearts>
    aliases: [ci]
permissions:
  customitems.admin:
    description: Grants access to all CustomItems commands.
    default: op
    children:
      customitems.give: true
      customitems.reload: true
      customitems.signbook: true
      customitems.spawner.admin: true
      customitems.hearts: true
  customitems.give:
    description: Allows giving custom items.
    default: op
  customitems.reload:
    description: Allows reloading the CustomItems configuration.
    default: op
  customitems.signbook:
    description: Allows signing a CustomSigningBook with a custom author.
    default: op
  customitems.spawner.admin:
    description: Allows managing custom mob spawners.
    default: op
  customitems.hearts:
    description: Allows toggling the server-wide max health feature.
    default: op
